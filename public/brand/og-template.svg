<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#64748B"/>
    </linearGradient>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E4E4E7" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <circle cx="1040" cy="90" r="180" fill="#4F46E5" opacity="0.06"/>
  <circle cx="180" cy="560" r="220" fill="#7C3AED" opacity="0.05"/>

  <!-- Logo icon -->
  <g transform="translate(88, 168) scale(3)">
    <rect width="32" height="32" rx="8" fill="url(#icon-bg)"/>
    <rect x="8.5" y="6" width="13" height="17.5" rx="2" fill="#FFFFFF"/>
    <rect x="10.5" y="9.5" width="7" height="1.4" rx="0.7" fill="#C7D2FE"/>
    <rect x="10.5" y="12.5" width="9" height="1.4" rx="0.7" fill="#A5B4FC"/>
    <rect x="10.5" y="15.5" width="5.5" height="1.4" rx="0.7" fill="#C7D2FE"/>
    <path d="M21.2 17.8 18.4 22.2h2.1l-1.3 4.2 4.8-6.4h-2.3l-.5-2.2Z" fill="#FBBF24"/>
  </g>

  <!-- Title -->
  <text x="200" y="228" font-family="Segoe UI, system-ui, sans-serif" font-size="72" font-weight="800" fill="#18181B" letter-spacing="-2">Eazy</text>
  <text x="370" y="228" font-family="Segoe UI, system-ui, sans-serif" font-size="72" font-weight="800" fill="#4F46E5" letter-spacing="-2">CV</text>

  <text x="88" y="300" font-family="Segoe UI, system-ui, sans-serif" font-size="34" font-weight="700" fill="url(#accent)" letter-spacing="-0.5">Bikin CV Gratis, No Ribet</text>

  <text x="88" y="360" font-family="Segoe UI, system-ui, sans-serif" font-size="24" font-weight="500" fill="#64748B">6 template modern · Mode ATS · Preview langsung</text>

  <!-- Feature pills -->
  <g transform="translate(88, 392)">
    <rect width="168" height="42" rx="21" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="84" y="27" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" fill="#059669">100% Gratis</text>
  </g>
  <g transform="translate(272, 392)">
    <rect width="188" height="42" rx="21" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="94" y="27" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" fill="#334155">Tanpa Login</text>
  </g>
  <g transform="translate(476, 392)">
    <rect width="210" height="42" rx="21" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="105" y="27" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" fill="#334155">Data di Browser</text>
  </g>

  <text x="88" y="520" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="600" fill="#94A3B8">cv.1tsprune.com</text>

  <!-- CV mockup -->
  <g filter="url(#card-shadow)" transform="translate(720, 110)">
    <rect width="360" height="410" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="28" y="28" width="120" height="16" rx="8" fill="#E2E8F0"/>
    <rect x="28" y="58" width="220" height="10" rx="5" fill="#F1F5F9"/>
    <rect x="28" y="78" width="180" height="10" rx="5" fill="#F1F5F9"/>
    <rect x="28" y="118" width="88" height="12" rx="6" fill="#4F46E5" opacity="0.85"/>
    <rect x="28" y="148" width="304" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="28" y="166" width="280" height="8" rx="4" fill="#F1F5F9"/>
    <rect x="28" y="184" width="260" height="8" rx="4" fill="#F1F5F9"/>
    <rect x="28" y="224" width="104" height="12" rx="6" fill="#7C3AED" opacity="0.75"/>
    <rect x="28" y="254" width="304" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="28" y="272" width="290" height="8" rx="4" fill="#F1F5F9"/>
    <rect x="28" y="312" width="96" height="12" rx="6" fill="#334155" opacity="0.8"/>
    <rect x="28" y="342" width="120" height="28" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="160" y="342" width="120" height="28" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="28" y="382" width="304" height="8" rx="4" fill="#E2E8F0"/>
